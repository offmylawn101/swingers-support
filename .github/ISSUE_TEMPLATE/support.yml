name: Swingers support request
description: Report a gameplay, performance, accessibility, or app issue.
title: "[Support] "
labels:
  - support
body:
  - type: markdown
    attributes:
      value: Do not include passwords, Apple ID details, or other private information.
  - type: dropdown
    id: category
    attributes:
      label: Category
      options:
        - Gameplay
        - Performance or heat
        - Visual or audio
        - Controls
        - Accessibility
        - Crash or launch
        - Privacy
        - Other
    validations:
      required: true
  - type: input
    id: device
    attributes:
      label: iPhone model
      placeholder: iPhone 16 Pro
    validations:
      required: true
  - type: input
    id: ios
    attributes:
      label: iOS version
      placeholder: iOS 27.0
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the issue and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: List the shortest reliable sequence that triggers the issue.
    validations:
      required: false
