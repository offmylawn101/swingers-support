<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Swingers App Store Support</title>
    <style>
      :root {
        color-scheme: dark;
        background: #12090b;
        color: #fff2bd;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      body {
        margin: 0;
        min-height: 100vh;
        background:
          radial-gradient(circle at 50% 0%, rgba(255, 227, 106, 0.22), transparent 34%),
          linear-gradient(180deg, #351814, #12090b 46%, #05080e);
      }
      main {
        width: min(720px, calc(100% - 36px));
        margin: 0 auto;
        padding: max(28px, env(safe-area-inset-top)) 0 max(34px, env(safe-area-inset-bottom));
      }
      img {
        display: block;
        width: min(520px, 100%);
        margin: 0 auto 18px;
      }
      h1 {
        margin: 0 0 12px;
        color: #ffe36a;
        font-size: clamp(2rem, 10vw, 4.6rem);
        line-height: 0.92;
        text-shadow: 0 4px 0 rgba(25, 8, 6, 0.75);
      }
      p {
        color: #f3d3b4;
        font-size: 1.05rem;
        line-height: 1.55;
      }
      nav {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-top: 26px;
      }
      a {
        display: inline-flex;
        align-items: center;
        min-height: 48px;
        padding: 0 18px;
        border: 2px solid rgba(25, 8, 6, 0.9);
        border-radius: 8px;
        background: linear-gradient(180deg, #ffe66e, #ff8a45);
        box-shadow: 0 6px 0 rgba(68, 18, 11, 0.9);
        color: #210605;
        font-weight: 1000;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main>
      <img src="./swingers.png" alt="Swingers logo" />
      <h1>Swingers</h1>
      <p>Swingers is an offline-first iPhone arcade game about swinging through an endless city, hitting speed rings, smashing buildings, and chasing your all-time high score.</p>
      <p>This site exists for App Store support, privacy, and review context.</p>
      <nav aria-label="Support pages">
        <a href="./privacy.html">Privacy Policy</a>
        <a href="./support.html">Support</a>
      </nav>
    </main>
  </body>
</html>
